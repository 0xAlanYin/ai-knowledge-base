name: Daily Knowledge Collection

on:
  # schedule:
    # 每天 UTC 08:00 运行（北京时间 16:00）
    # - cron: "0 8 * * *"
  # 支持手动触发
  workflow_dispatch:
    inputs:
      sources:
        description: "数据源（github,rss 或两者）"
        required: true
        default: "github"
        type: string
      limit:
        description: "每个源的最大采集数量"
        required: false
        default: "20"
        type: string
      verbose:
        description: "启用详细日志"
        required: false
        default: "false"
        type: boolean

# 需要写入权限来提交更改
permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 获取完整历史记录用于 git diff

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip" # 启用 pip 缓存

      - name: Install dependencies
        run: |
          # 安装依赖
          pip install -r requirements.txt

      - name: Configure LLM API keys
        env:
          LLM_PROVIDER: ${{ secrets.LLM_PROVIDER }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          QWEN_API_KEY: ${{ secrets.QWEN_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          echo "LLM_PROVIDER configured"
          if [ -n "$DEEPSEEK_API_KEY" ]; then
            echo "DEEPSEEK_API_KEY is set"
          fi
          if [ -n "$QWEN_API_KEY" ]; then
            echo "QWEN_API_KEY is set"
          fi
          if [ -n "$OPENAI_API_KEY" ]; then
            echo "OPENAI_API_KEY is set"
          fi

      - name: Run knowledge collection pipeline
        env:
          LLM_PROVIDER: ${{ secrets.LLM_PROVIDER }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          QWEN_API_KEY: ${{ secrets.QWEN_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          # 构建命令参数
          CMD_ARGS="--sources ${{ github.event.inputs.sources || 'github,rss' }} --limit ${{ github.event.inputs.limit || '20' }}"

          if [ "${{ github.event.inputs.verbose || 'false' }}" = "true" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            CMD_ARGS="$CMD_ARGS --verbose"
          fi

          echo "Running: python pipeline/pipeline.py $CMD_ARGS"
          python pipeline/pipeline.py $CMD_ARGS

      - name: Validate JSON files
        run: |
          if [ -f "hooks/validate_json.py" ]; then
            echo "Running JSON validation..."
            # 只验证已处理的知识条目，这些应该符合 AGENTS.md 中定义的格式
            if [ -d "knowledge/articles/processed" ]; then
              python hooks/validate_json.py knowledge/articles/processed/*.json
            else
              echo "No processed articles directory found, skipping validation"
            fi
          else
            echo "validate_json.py not found, skipping validation"
          fi

      - name: Check article quality
        run: |
          if [ -f "hooks/check_quality.py" ]; then
            echo "Running quality check..."
            # 检查处理过的文章
            if [ -d "knowledge/articles/processed" ]; then
              python hooks/check_quality.py knowledge/articles/processed/*.json
            else
              echo "No processed articles directory found, skipping quality check"
            fi
          else
            echo "check_quality.py not found, skipping quality check"
          fi

      - name: Check for new articles
        id: check_changes
        run: |
          # 检查是否有新文件或修改的文件
          git add -N .
          CHANGES=$(git diff --name-only)
          if [ -z "$CHANGES" ]; then
            echo "No new articles found"
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "new_articles_count=0" >> $GITHUB_OUTPUT
          else
            echo "Changes detected:"
            echo "$CHANGES"
            echo "has_changes=true" >> $GITHUB_OUTPUT
            
            # 统计新文章数量（pending目录中的新JSON文件）
            if [ -d "knowledge/articles/pending" ]; then
              # 获取pending目录中相对于git索引的新文件
              NEW_ARTICLES=$(git status --porcelain knowledge/articles/pending/ 2>/dev/null | grep -E '^\?\?|^ A|^ M' | grep '\.json$' || true)
              NEW_ARTICLES_COUNT=$(echo "$NEW_ARTICLES" | wc -l | tr -d ' ')
              echo "Found $NEW_ARTICLES_COUNT new articles in pending directory"
            else
              NEW_ARTICLES_COUNT=0
              echo "Pending directory not found"
            fi
            
            echo "new_articles_count=$NEW_ARTICLES_COUNT" >> $GITHUB_OUTPUT
          fi

      - name: Configure Git
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

      - name: Commit and push changes
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          # 添加所有更改
          git add .

          # 获取当前日期
          CURRENT_DATE=$(date '+%Y-%m-%d')

          # 构建提交消息
          COMMIT_MSG="📚 Add ${{ steps.check_changes.outputs.new_articles_count || '0' }} new articles - $CURRENT_DATE"

          # 如果有具体文件变化，添加到提交消息
          CHANGES=$(git diff --cached --name-only | head -5)
          if [ -n "$CHANGES" ]; then
            COMMIT_MSG="$COMMIT_MSG"$'\n\n'$'Changes:'
            echo "$CHANGES" | while read file; do
              COMMIT_MSG="$COMMIT_MSG"$'\n'-" $file"
            done
          fi

          echo "Committing with message: $COMMIT_MSG"
          git commit -m "$COMMIT_MSG"

          # 推送到当前分支
          git push
